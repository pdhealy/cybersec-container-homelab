networks:
  external_net:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      # Disable intra-network ICC so containers on the same subnet cannot
      # communicate directly; all traffic is forced through the firewall container.
      # Cross-bridge routing still works because the DOCKER-USER iptables chain
      # is configured by setup_host.sh / cli.py to ACCEPT br-+ to br-+.
      com.docker.network.bridge.enable_icc: "false"
    ipam:
      config:
        - subnet: 10.10.10.0/24
  dmz_net:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
    ipam:
      config:
        - subnet: 10.10.20.0/24
  internal_net:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
    ipam:
      config:
        - subnet: 10.10.30.0/24

services:
  firewall:
    build:
      context: ./services/firewall
    image: homelab-firewall:latest
    container_name: firewall
    networks:
      external_net:
        ipv4_address: 10.10.10.254
      dmz_net:
        ipv4_address: 10.10.20.254
      internal_net:
        ipv4_address: 10.10.30.254
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYSLOG
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/log
      - /var/spool/rsyslog
    # iptables requires uid 0 even when CAP_NET_ADMIN is granted. The Dockerfile
    # defines USER 1000:1000 as the default, so we override here explicitly.
    # Future work: migrate to macvlan/ipvlan to decouple L3 routing from
    # container privileges (see implementation_status.md §4).
    user: "0:0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "iptables -L"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: /firewall-rules.sh
    sysctls:
      - net.ipv4.ip_forward=1

  pihole:
    build:
      context: ./services/pi-hole
    image: homelab-pihole:latest
    container_name: pihole
    networks:
      internal_net:
        ipv4_address: 10.10.30.5
    ports:
      - "8080:80"
    environment:
      - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD}
      - DNSMASQ_USER=root
      - FTLCONF_dns_listeningMode=ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - SYS_NICE
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
      - SETPCAP
      - SETFCAP
      - SYS_CHROOT
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/pihole
      - /var/run/pihole
      - /var/run/lighttpd
      - /run
      - /run/lighttpd
      - /etc/pihole
      - /etc/dnsmasq.d
      - /var/spool/cron/crontabs
      - /var/log/lighttpd
      - /var/cache/lighttpd
      - /etc/lighttpd
      - /var/spool/rsyslog
    restart: unless-stopped
    depends_on:
      firewall:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - "ip route del default && ip route add default via 10.10.30.254 && /usr/sbin/rsyslogd && exec start.sh"

  wazuh.manager:
    profiles: ["wazuh"]
    build:
      context: ./services/siem/wazuh
    image: homelab-wazuh:latest
    container_name: wazuh-manager
    networks:
      internal_net:
        ipv4_address: 10.10.30.10
    ports:
      - "55000:55000"
    environment:
      - WAZUH_ADMIN_PASSWORD=${WAZUH_ADMIN_PASSWORD}
      - S6_READ_ONLY_ROOT=1
    deploy:
      resources:
        limits:
          memory: 4G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
      - SYS_PTRACE
      - SYS_CHROOT
      - SYS_RESOURCE
      - SETFCAP
      - SETPCAP
      - KILL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run:exec,mode=755
      - /var/run:exec,mode=755
      - /var/ossec/api/configuration
      - /var/ossec/etc
      - /var/ossec/logs
      - /var/ossec/queue
      - /var/ossec/var/multigroups
      - /var/ossec/integrations
      - /var/ossec/active-response/bin
      - /var/ossec/agentless
      - /var/ossec/wodles
      - /etc/filebeat
      - /var/ossec/var/run:exec,mode=770,uid=999,gid=999
      - /var/ossec/var/start-script-lock
      - /var/lib/filebeat
    volumes:
      - wazuh_data:/var/ossec/data
    restart: unless-stopped
    depends_on:
      firewall:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - "ip route del default && ip route add default via 10.10.30.254 && exec /init"

  splunk:
    profiles: ["splunk"]
    build:
      context: ./services/siem/splunk
    image: homelab-splunk:latest
    container_name: splunk
    networks:
      internal_net:
        ipv4_address: 10.10.30.15
    ports:
      - "8000:8000"
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=cyberhomelab_splunk_secure
    restart: unless-stopped
    depends_on:
      firewall:
        condition: service_healthy

  metasploitable2:
    profiles: ["metasploitable2"]
    build:
      context: ./services/vulnerable-target/metasploitable2
    image: homelab-metasploitable2:latest
    container_name: metasploitable2
    dns:
      - 10.10.30.5
    networks:
      dmz_net:
        ipv4_address: 10.10.20.10
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/run
      - /var/tmp
      - /var/log
      - /var/lib/mysql
      - /var/lib/postgresql
      - /var/lib/tomcat5.5
      - /var/lib/samba
      - /etc/samba
      - /root/.vnc
    volumes:
      - ./services/vulnerable-target/metasploitable2/syslog.conf:/etc/syslog.conf:ro
    restart: unless-stopped
    depends_on:
      firewall:
        condition: service_healthy
    command: >
      sh -c "route del default || true && route add default gw 10.10.20.254 && /bin/services.sh && tail -f /dev/null"

  ubuntu-target:
    profiles: ["ubuntu"]
    build:
      context: ./services/vulnerable-target/ubuntu-target
    image: homelab-ubuntu-target:latest
    container_name: ubuntu-target
    networks:
      dmz_net:
        ipv4_address: 10.10.20.15
    command: tail -f /dev/null
    depends_on:
      firewall:
        condition: service_healthy

  kali:
    profiles: ["kali"]
    build:
      context: ./services/attacker-node/kali
    image: homelab-kali:latest
    container_name: kali
    networks:
      external_net:
        ipv4_address: 10.10.10.10
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
    user: "0:0"
    depends_on:
      firewall:
        condition: service_healthy
    # Start as root to configure the default route, then drop to hacker via gosu.
    # gosu uses exec(3) so the final process has no residual root capabilities.
    command: >
      sh -c "ip route del default && ip route add default via 10.10.10.254 && exec gosu hacker tail -f /dev/null"

  atomic-red:
    profiles: ["atomicred"]
    build:
      context: ./services/attacker-node/atomic-red
    image: homelab-atomicred:latest
    container_name: atomic-red
    networks:
      external_net:
        ipv4_address: 10.10.10.20
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    depends_on:
      firewall:
        condition: service_healthy
    command: >
      sh -c "ip route del default && ip route add default via 10.10.10.254 && tail -f /dev/null"

  wiretap:
    build:
      context: ./services/wiretap
    image: homelab-wiretap:latest
    container_name: wiretap
    network_mode: "service:firewall"
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./logs/pcaps:/pcaps
    command: tcpdump -i any -U -w /pcaps/homelab-capture.pcap
    depends_on:
      firewall:
        condition: service_healthy

volumes:
  wazuh_data:
